# TMS Smart Setup definition file for Double Trouble.
# Do not modify this file. To configure smart setup, edit tms.config.yaml instead.
minimum required tmsbuild version: 3.3
  
application:
  id: test.tag.tag.and.branch.git
  name: "Test Tag Tag and Branch GIT"
  description: Tag, tag and branch.

supported frameworks:
  vcl:
    ide since: delphisydney
    platforms:
      - win32intel
      - win64intel
      - win64xintel
      - winarm64ec
    c++ builder support: true

  fmx:
    ide since: delphisydney
    platforms:
      - all

packages:
  - TagTagAndBranch: [runtime, vcl, fmx]

package definitions:
  TagTagAndBranch:
    framework type: NONE # can be NONE, FMX or VCL
    description: Tag, tag and branch.
    requires: rtl   #write the dcp packages this package requires. don't include the dcp extension.
    files:
      - source:
          folder: src
          include file mask: '*'  
