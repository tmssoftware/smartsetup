# yaml-language-server: $schema=https://raw.githubusercontent.com/tmssoftware/smartsetup/refs/heads/main/tms/example-config/tmsbuild.schema.json

minimum required tmsbuild version: 3.4

application:
  id: test.links
  name: links

supported frameworks:
  rtl:
    ide since: delphi7
    platforms:
      - win32intel
      - win64intel
    c++ builder support: true


packages:
  - link_pkg: [runtime, rtl]

package options:
  add libsuffix: true

file links:
  - link:
      file to link: Packages\d11+\link_pkg.dpk
      link to folder: '%bpl-folder-64%'
