# =====================================================================================================
# TMS Smart Setup configuration file for product test.app.updater
# See https://doc.tmssoftware.com/smartsetup/guide/creating-bundles.html#creating-a-tmsbuildyaml-file
# =====================================================================================================
# yaml-language-server: $schema=https://raw.githubusercontent.com/tmssoftware/smartsetup/refs/heads/main/tms/example-config/tmsbuild.schema.json

minimum required tmsbuild version: 3.4

# General information about the product.
application:
  id: test.app.updater
  name: test.app.updater

# Frameworks are just a group of supported IDEs and platforms. You can define as much as you want with any name you desire, and then combine them to specify what platforms and IDEs the packages support.
supported frameworks:
  app:
    ide since: delphi11
    platforms:
      - win32intel

# List of packages in the library. Each package must have a unique name, and must be listed only once.
packages:
  - versioner: [exe,app]

exe options:
  compile with: latest

# Write here the application ids for the *direct* dependencies.
# if "A" depends on "B" and "B" on "C", you can just write "B" as the "A" dependency.
# You can also write "C" and it will still work, but it is not necessary. Only direct dependencies are needed.
# If this is an application and you want it to depend in all the installed components, you can write 'all.installed.components' here instead of listing them.
dependencies:
  - all.installed.components: all installed components
